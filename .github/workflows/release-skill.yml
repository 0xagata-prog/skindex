name: Release SkinDex Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package standalone Skill
        run: |
          mkdir -p release/skindex
          cp -R skill/. release/skindex/
          cd release
          zip -r ../skindex-skill.zip skindex

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG"; then
            gh release upload "$TAG" skindex-skill.zip --clobber
          else
            gh release create "$TAG" skindex-skill.zip --generate-notes --title "SkinDex Skill $TAG"
          fi
