name: Release SkinDex Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Verify source before packaging
        run: |
          npm ci
          npm run typecheck
          npm run test:skindex
          npm test
          npm run lint

      - name: Package standalone Skill
        run: |
          mkdir -p release/skindex
          cp -R skill/. release/skindex/
          cd release
          zip -r ../skindex-skill.zip skindex

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG"; then
            gh release upload "$TAG" skindex-skill.zip --clobber
          else
            gh release create "$TAG" skindex-skill.zip --generate-notes --title "SkinDex Skill $TAG"
          fi
