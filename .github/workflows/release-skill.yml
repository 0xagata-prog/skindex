name: Release SkinDex Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Verify source before packaging
        run: |
          npm ci
          npm run typecheck
          npm run test:skindex
          npm test
          npm run lint

      - name: Package standalone Skill
        run: |
          mkdir -p release/skindex
          cp -R skill/. release/skindex/
          cd release
          zip -r ../skindex-skill.zip skindex

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG"; then
            gh release upload "$TAG" skindex-skill.zip --clobber
          else
            gh release create "$TAG" skindex-skill.zip --generate-notes --title "SkinDex Skill $TAG"
          fi
